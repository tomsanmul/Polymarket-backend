spring.application.name=polymarket-backend

# Configuración de la Base de Datos (Usa variables de entorno, con H2 como respaldo por defecto)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:aptpredictor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:default}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:default}

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.show-sql=true

# Buenas prácticas: Desactivar Open-In-View para mejorar rendimiento y evitar warnings
spring.jpa.open-in-view=false

# Configuración de GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.schema.printer.enabled=true

# API Keys y Propiedades del Simulador
polyrouter.api-key=${POLYROUTER_API_KEY:}
simulator.default-balance=100000
simulator.price-poll-interval-ms=30000
simulator.snapshot-throttle-ms=10000